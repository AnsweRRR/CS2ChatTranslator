name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - "docs/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: "10.0.x"
  CONFIGURATION: Release
  RUNTIME_IDENTIFIER: win-x64

jobs:
  build:
    name: Build Windows apps
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore CS2ChatTranslator.slnx

      - name: Build
        run: dotnet build CS2ChatTranslator.slnx --configuration $env:CONFIGURATION --no-restore

      - name: Publish console app
        run: >
          dotnet publish CS2ChatTranslator.Console/CS2ChatTranslator.Console.csproj
          --configuration $env:CONFIGURATION
          --runtime $env:RUNTIME_IDENTIFIER
          --self-contained true
          --output artifacts/publish/CS2ChatTranslator.Console
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Publish WPF overlay app
        run: >
          dotnet publish CS2ChatTranslator.Overlay/CS2ChatTranslator.Overlay.csproj
          --configuration $env:CONFIGURATION
          --runtime $env:RUNTIME_IDENTIFIER
          --self-contained true
          --output artifacts/publish/CS2ChatTranslator.Overlay
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Stage release executables
        run: |
          New-Item -ItemType Directory -Path artifacts/release -Force
          Copy-Item artifacts/publish/CS2ChatTranslator.Console/CS2ChatTranslator.exe artifacts/release/CS2ChatTranslator.Console-win-x64.exe -Force
          Copy-Item artifacts/publish/CS2ChatTranslator.Overlay/CS2ChatTranslator.Overlay.exe artifacts/release/CS2ChatTranslator.Overlay-win-x64.exe -Force

      - name: Upload console artifact
        uses: actions/upload-artifact@v4
        with:
          name: CS2ChatTranslator.Console-win-x64
          path: artifacts/release/CS2ChatTranslator.Console-win-x64.exe
          if-no-files-found: error

      - name: Upload WPF overlay artifact
        uses: actions/upload-artifact@v4
        with:
          name: CS2ChatTranslator.Overlay-win-x64
          path: artifacts/release/CS2ChatTranslator.Overlay-win-x64.exe
          if-no-files-found: error

      - name: Publish versioned GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/release/CS2ChatTranslator.Console-win-x64.exe
            artifacts/release/CS2ChatTranslator.Overlay-win-x64.exe

      - name: Publish latest GitHub release
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseTag = "latest"
          $releaseTitle = "Latest Windows Build"
          $releaseNotes = "Automatic build from commit $env:GITHUB_SHA."
          $assets = @(
            "artifacts/release/CS2ChatTranslator.Console-win-x64.exe",
            "artifacts/release/CS2ChatTranslator.Overlay-win-x64.exe"
          )

          git tag --force $releaseTag $env:GITHUB_SHA
          git push --force origin $releaseTag

          gh release view $releaseTag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $releaseTag $assets --clobber
            gh release edit $releaseTag --title $releaseTitle --notes $releaseNotes --latest
          }
          else {
            gh release create $releaseTag $assets --title $releaseTitle --notes $releaseNotes --latest
          }
